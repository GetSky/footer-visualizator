name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - getsky/cors_2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build proxy binary
        run: go build -trimpath -ldflags="-s -w" -o dist/footter-proxy-match ./cmd/footter_proxy_match

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t footter-proxy-match:ci .

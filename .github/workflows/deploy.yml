name: Deploy Footter Proxy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  SERVICE_DIR: /opt/footter-proxy-match
  DOMAIN: getsky.tech

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}/footter-proxy-match" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}:latest
          DOMAIN: ${{ env.DOMAIN }}
          SERVICE_DIR: ${{ env.SERVICE_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE,DOMAIN,SERVICE_DIR,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            mkdir -p "$SERVICE_DIR"
            cd "$SERVICE_DIR"
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            if systemctl list-unit-files footter-proxy-match.service >/dev/null 2>&1; then
              systemctl stop footter-proxy-match.service || true
              systemctl disable footter-proxy-match.service || true
            fi
            cat > docker-compose.yml <<EOF
            services:
              footter-proxy-match:
                image: ${IMAGE}
                container_name: footter-proxy-match
                restart: unless-stopped
                environment:
                  ACME_DOMAIN: ${DOMAIN}
                  ACME_CACHE_DIR: /var/lib/footter-proxy-match/certs
                  HTTP_ADDR: :80
                  TLS_ADDR: :443
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /var/lib/footter-proxy-match/certs:/var/lib/footter-proxy-match/certs
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
